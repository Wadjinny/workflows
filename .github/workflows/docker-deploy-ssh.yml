name: Docker Deploy over SSH (Compose)

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: true
      compose_file:
        type: string
        required: false
        default: compose.yml
      remote_dir:
        type: string
        required: true
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true
      SSH_PORT:
        required: false
      GHCR_TOKEN:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p ${{ inputs.remote_dir }}"
          scp -i ~/.ssh/id_rsa -P "${{ secrets.SSH_PORT || '22' }}" \
            "${{ inputs.compose_file }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ inputs.remote_dir }}/compose.yml"

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          REMOTE_DIR: ${{ inputs.remote_dir }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            IMAGE_TAG="$IMAGE_TAG" REMOTE_DIR="$REMOTE_DIR" \
            GHCR_TOKEN="$GHCR_TOKEN" GHCR_USER="$GHCR_USER" bash -s <<'EOF'
            set -e
            cd "$REMOTE_DIR"
            echo "IMAGE_TAG=$IMAGE_TAG" > .env
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f
          EOF
