name: Deploy Static HTML Site

on:
  workflow_call:
    inputs:
      source_dir:
        required: false
        type: string
        default: .
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true
      SSH_PORT:
        required: false
      SSH_DEPLOY_DIR:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT || '22' }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pre-clean target directory
        run: |
          ssh -i ~/.ssh/id_rsa \
            -p "${{ secrets.SSH_PORT || '22' }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf ${{ secrets.SSH_DEPLOY_DIR }}/${{ github.event.repository.name }}/* 2>/dev/null || true"

      - name: Upload via rsync
        run: |
          rsync -az --delete \
            --exclude '.git' --exclude '.github' \
            -e "ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT || '22' }}" \
            ${{ inputs.source_dir }}/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_DEPLOY_DIR }}/${{ github.event.repository.name }}"
